---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 30
---
# Original memory: 300Mi request, 600Mi limit
# After OOM webhook should apply 600M request, 1200M limit
apiVersion: v1
kind: Pod
metadata:
  namespace: test-oom
  labels:
    app: stress
spec:
  containers:
  - name: stress
    resources:
      requests:
        memory: "600M"
      limits:
        memory: "1200M"
status:
  phase: Running
  containerStatuses:
  - name: stress
    ready: true
