---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
---
apiVersion: v1
kind: Pod
metadata:
  namespace: test-webhook
  labels:
    app: redis
spec:
  containers:
  - name: redis
    resources:
      requests:
        cpu: "500m"
        memory: "200M"
      limits:
        memory: "512M"
status:
  phase: Running
---
apiVersion: v1
kind: Pod
metadata:
  namespace: test-webhook
  labels:
    app: memcached
spec:
  containers:
  - name: memcached
    resources:
      requests:
        cpu: "250m"
        memory: "80M"
      limits:
        memory: "512M"
status:
  phase: Running
